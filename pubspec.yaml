name: siyaha_plus_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  http: ^1.2.2 # Updated version
  flutter_dash: ^1.0.0
  get: ^4.6.6
  flutter_svg: ^2.0.4 # Updated version
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2 # Updated version
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0 # Compatible version

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  intl_utils: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - images/apple.svg
    - images/facebook.svg
    - images/google.svg
    - images/logo.jpg
    - images/microsoft.svg
    - images/profile.svg

  fonts:
    - family: Caveat
      fonts:
        - asset: fonts/Caveat-VariableFont_wght.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/logo.jpg"
